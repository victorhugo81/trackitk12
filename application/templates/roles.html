{% extends 'base.html' %}
{% block content %}


    <!-- main content card -->

<div class="row">
    <div class="col-12">
        <div class="main-card-box card my-4">
        <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
        <div class="bg-gradient-main custom-title-card">
          <h2 class="text-white text-capitalize ps-3"><i class="material-symbols-rounded opacity-5">group_add</i> {{ current_page_name }}</h2>
          </div>
          <div class="card-body px-0 pb-2">
            <br>
            <div class="table-per-page-section">
            <div class="row row justify-content-between">
              <div class="col-4">
                <form method="get" class="d-flex">
                  <label for="per_page">Items per page: </label>
                  <select name="per_page" id="per_page" class="per-page-drop"  onchange="this.form.submit()">
                    <option value="10" {% if per_page == 10 %}selected{% endif %}>10</option>
                    <option value="20" {% if per_page == 25 %}selected{% endif %}>25</option>
                    <option value="50" {% if per_page == 50 %}selected{% endif %}>50</option>
                  </select>
                </form>
              </div>
              <div class="col-2 text-end">
              <a href="{{ url_for('routes.add_role') }}" type="button" class="btn bg-gradient-main add-table-button shadow-dark">Add Role</a>
            </div>
          </div>
        </div>
    <!-- pause main content card -->





        <!-- main content table -->
          <div class="table-responsive p-0">
            <table class="table align-items-right mb-0 table-striped">
              <thead>
                <tr">
                  <th class="text-uppercase text-xxs font-weight-bolder text-start" style="width:20px;">Role ID</th>
                  <th class="text-uppercase text-xxs font-weight-bolder">Role Name</th>
                  <th class="text-uppercase text-xxs font-weight-bolder text-end">Actions</th>
                </tr>
              </thead>
              <tbody>
                {% for role in roles %}
                <tr class="table-highlight-row">
                  <td style="width:20px;">
                    <div class="d-flex px-2 py-1">
                      <div class="d-flex flex-column justify-content-center">
                        <h6 class="mb-0 text-sm">{{ role.id }}</h6>
                      </div>
                    </div>
                  </td>
                  <td>
                    <div class="d-flex px-2 py-1">
                      <div class="d-flex flex-column justify-content-center">
                        <h6 class="mb-0 text-sm">{{ role.role_name }}</h6>
                      </div>
                    </div>
                  </td>
                  <td class="align-middle">
                    <div class="d-flex justify-content-end gap-2">
                      <a href="{{ url_for('routes.edit_role', role_id=role.id) }}" type="button" class="btn table-button-edit font-weight-bold" aria-label="Edit {{ role.role_name }}">
                        <i class="material-symbols-rounded position-relative text-lg" aria-hidden="true">edit</i>
                      </a>
                      <button type="button" class="btn table-button-delete font-weight-bold"
                              data-bs-toggle="modal" data-bs-target="#deleteModal"
                              data-record-name="{{ role.role_name }}"
                              data-action-url="{{ url_for('routes.delete_role', role_id=role.id) }}"
                              aria-label="Delete {{ role.role_name }}">
                        <i class="material-symbols-rounded position-relative text-lg" aria-hidden="true">delete</i>
                      </button>
                    </div>
                  </td>
                  
                </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>
          <nav aria-label="Page navigation">
            <ul class="pagination">
              <!-- Render pagination links from flask-paginate -->
              {{ pagination.links }}
            </ul>
        <!-- end content table -->

          
    <!-- continue main content card -->
  </div>
</div>
</div>
</div>
<!-- End main content card -->

{% endblock %}
